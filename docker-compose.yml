# version: ${COMPOSE_VERSION}
services:
  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION} 
    container_name: rabbitmq   
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - 15672:15672
      - 5672:5672
    networks:
      - all_service_network

  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    container_name: postgres_db
    volumes: 
      - postgres_data:/var/lib/postgresql/data/
    env_file: 
      - ./admin/.env
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
      interval: ${INTERVAL_CHECK}
      timeout: ${TIMEOUT_CHECK}
      retries: ${RETRIES_CHECK}
      # start_period: ${START_CHECK}
    networks:
      - all_service_network
  
  django:
    build: ./admin/admin-panel
    env_file:
      - ./admin/.env
    container_name: django_api
    volumes:
      - static-volume:/opt/app/static
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - all_service_network

  nginx:
    image: nginx:${NGINX_VERSION}
    restart: always
    container_name: nginx_server
    volumes:
      - ./admin/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./admin/configs:/etc/nginx/conf.d:ro
      - ./data:/data/:ro
      - static-volume:/app/static:ro
    depends_on:
      - django
    ports:
      - ${NGINX_PORTS}
    networks:
        - all_service_network

  notification_api:
    container_name: "notification_api"
    build: ./notification/notification_api/src
    env_file:
      - ./notification/notification_api/env/prod/.env
    depends_on:
      - rabbitmq
        #condition: service_healthy
    expose:
      - 8001
    networks:
      - all_service_network

  notification_nginx:
    container_name: "notification_nginx"
    restart: always
    build: ./notification/nginx
    volumes:
      - ./notification/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./notification/nginx/configs:/etc/nginx/conf.d:ro
    depends_on:
      - notification_api
    ports:
      - ${NGINX_PORTS_NOTF}
    networks:
      - all_service_network

  worker_01:
    container_name: "worker_01"
    build: ./worker/src
    env_file:
      - ./worker/src/.env
    depends_on:
      - rabbitmq
    networks:
      - all_service_network
      - auth_service_network
        
  mailhog:
    image: mailhog/mailhog
    container_name: 'mailhog'
    expose:
      - 1025
    ports:
      - "8025:8025"
    networks:
      - all_service_network


volumes:
  postgres_data:
  rabbitmq_data:
  static-volume:

networks:
  all_service_network:
    driver: bridge


include:
  - auth_service/docker-compose.yml